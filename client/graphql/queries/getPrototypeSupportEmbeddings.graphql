query GetPrototypeSupportEmbeddings($modelName:String!) {
  getPrototypeSupportEmbeddings(modelName:$modelName) {
    label
    prototype
    trainingExamples {
      coordinates
      inputData {
        file
        dataIndex
      }
      labels {
        label
        confidence
      }
      ood
    }
  }
}