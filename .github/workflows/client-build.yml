name: Ensure the Client builds properly

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

defaults:
  run:
    working-directory: ./client

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: client/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('client/package-lock.json') }}-${{ hashFiles('client/**/*.[jt]s', 'client/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('client/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Set env
        run: echo "GITHUB_PAGES=true" >> $GITHUB_ENV

      # Intentionally runnning `next build` to avoid the postbuild step in package.json
      - name: Build Next.js
        run: npx next build