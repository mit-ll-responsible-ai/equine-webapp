name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  python-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment: python-publish
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Build client (cleaned up) ----
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: client/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('client/package-lock.json') }}-${{ hashFiles('client/**/*.[jt]s', 'client/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('client/package-lock.json') }}-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      # ---- Python package ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Show version from built wheel
        run: |
          WHEEL_FILE=$(ls dist/*.whl | head -n 1)
          unzip -p "$WHEEL_FILE" '*/METADATA' | grep -E '^(Name|Version|Metadata-Version)'

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@v1.12.4